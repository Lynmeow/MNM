<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm Sản Phẩm</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
    <h1>Thêm Sản Phẩm Mới</h1>
    
    <form th:action="@{/admin/sanpham/add}" method="post" enctype="multipart/form-data">
        <label for="tenSP">Tên Sản Phẩm:</label>
        <input type="text" id="tenSP" name="tenSP" required/><br>

        <label for="gia">Giá:</label>
        <input type="number" id="gia" name="gia" step="0.01" min="0" required/><br>

        <label for="soLuong">Số lượng tồn kho:</label>
        <input type="number" id="soLuong" name="soLuong" min="0" value="0" required/><br>

        <label for="mota">Mô Tả:</label>
        <textarea id="mota" name="mota" required></textarea><br>

        <label for="hinhAnh">Hình Ảnh:</label>
        <input type="file" id="hinhAnh" name="hinhAnh" required/><br>

        <label for="danhMuc">Danh Mục:</label>
        <select name="maDM" id="danhMuc" required>
            <option value="">-- Chọn danh mục --</option>
            <option th:each="danhMuc : ${dsdanhmuc}" 
                    th:value="${danhMuc.maDM}" 
                    th:text="${danhMuc.tenDM}"></option>
        </select><br>

        <button type="submit">Thêm Sản Phẩm</button>
        <a th:href="@{/admin/sanpham}">Hủy</a>
    </form>
</body>
</html>
