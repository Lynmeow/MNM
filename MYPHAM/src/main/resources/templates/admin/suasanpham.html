        <!DOCTYPE html>
        <html lang="vi" xmlns:th="http://www.thymeleaf.org">
        <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sửa Sản Phẩm</title>
        <link rel="stylesheet" href="/css/admin.css">
        </head>
        <body>
        <h1>Sửa Sản Phẩm</h1>

<form action="#" th:action="@{/admin/sanpham/edit/{maSP}(maSP=${sanPham.maSP})}"        method="post" enctype="multipart/form-data">

        <input type="hidden" name="maSP" th:value="${sanPham.maSP}"/>

        <label for="tenSP">Tên Sản Phẩm:</label>
        <input type="text" id="tenSP" name="tenSP" th:value="${sanPham.tenSP}" required/><br>

        <label for="gia">Giá:</label>
        <input type="number" id="gia" name="gia" th:value="${sanPham.gia}" step="0.01" min="0" required/><br>

        <label for="soLuong">Số lượng tồn kho:</label>
        <input type="number" id="soLuong" name="soLuong" th:value="${sanPham.soLuong}" min="0" required/><br>

        <label for="mota">Mô Tả:</label>
        <textarea id="mota" name="mota" required th:text="${sanPham.mota}"></textarea><br>

        <label for="hinhAnh">Hình Ảnh (để trống nếu không đổi):</label>
        <input type="file" id="hinhAnh" name="hinhAnh"/><br>
        <img th:if="${sanPham.hinhAnh}" 
                th:src="@{'/anh/' + ${sanPham.hinhAnh}}" 
                alt="Hình hiện tại" width="100"/><br>

        <label for="danhMuc">Danh Mục:</label>
        <select name="maDM" id="danhMuc" required>
        <option th:each="danhMuc : ${dsdanhmuc}" 
                th:value="${danhMuc.maDM}" 
                th:text="${danhMuc.tenDM}"
                th:selected="${sanPham.danhmuc != null and sanPham.danhmuc.maDM == danhMuc.maDM}"></option>
        </select><br>

        <button type="submit">Cập Nhật</button>
        <a href="/admin/sanpham">Hủy</a>
        </form>
        </body>
        </html>
