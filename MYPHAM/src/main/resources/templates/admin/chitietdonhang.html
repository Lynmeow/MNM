<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết đơn hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .info-label {
            font-weight: 600;
            color: #495057;
        }
        .card-header {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container mt-5 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-file-invoice"></i> Chi tiết đơn hàng #<span th:text="${donHang.id}"></span></h2>
            <a th:href="@{/admin/donhang}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Quay lại
            </a>
        </div>

        <!-- Thông tin đơn hàng -->
        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="fas fa-info-circle"></i> Thông tin đơn hàng</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <p><span class="info-label">Mã đơn hàng:</span> <span th:text="${donHang.id}"></span></p>
                        <p><span class="info-label">Khách hàng ID:</span> <span th:text="${donHang.userId}"></span></p>
                        <p><span class="info-label">Địa chỉ giao hàng:</span> <br><span th:text="${donHang.diaChi}"></span></p>
                        <p><span class="info-label">Ngày đặt:</span> <span th:text="${#dates.format(donHang.ngayTao, 'dd/MM/yyyy HH:mm:ss')}"></span></p>
                    </div>
                    <div class="col-md-6">
                        <p><span class="info-label">Phương thức thanh toán:</span> 
                            <span class="badge bg-info" th:text="${donHang.phuongThucThanhToan}"></span>
                        </p>
                        <p><span class="info-label">Tổng tiền:</span> <span th:text="${#numbers.formatDecimal(donHang.tongTien, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span></p>
                        <p><span class="info-label">Giảm giá:</span> <span th:text="${#numbers.formatDecimal(donHang.giamGia, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span></p>
                        <p><span class="info-label">Thanh toán:</span> 
                            <span class="text-danger fw-bold fs-5" th:text="${#numbers.formatDecimal(donHang.thanhToan, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Cập nhật trạng thái -->
        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-warning">
                <h5 class="mb-0"><i class="fas fa-edit"></i> Cập nhật trạng thái</h5>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/donhang/update-status/{id}(id=${donHang.id})}" method="post">
                    <div class="row align-items-center">
                        <div class="col-md-4">
                            <label class="form-label info-label">Trạng thái hiện tại:</label>
                            <p>
                                <span th:class="${donHang.trangThai == 'Chờ xác nhận' ? 'badge bg-warning fs-6' : 
                                                (donHang.trangThai == 'Đang giao' ? 'badge bg-info fs-6' : 
                                                (donHang.trangThai == 'Hoàn thành' ? 'badge bg-success fs-6' : 'badge bg-danger fs-6'))}"
                                      th:text="${donHang.trangThai}"></span>
                            </p>
                        </div>
                        <div class="col-md-5">
                            <label class="form-label info-label">Chọn trạng thái mới:</label>
                            <select name="trangThai" class="form-select">
                                <option value="Chờ xác nhận" th:selected="${donHang.trangThai == 'Chờ xác nhận'}">Chờ xác nhận</option>
                                <option value="Đang giao" th:selected="${donHang.trangThai == 'Đang giao'}">Đang giao</option>
                                <option value="Hoàn thành" th:selected="${donHang.trangThai == 'Hoàn thành'}">Hoàn thành</option>
                                <option value="Đã hủy" th:selected="${donHang.trangThai == 'Đã hủy'}">Đã hủy</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">&nbsp;</label>
                            <button type="submit" class="btn btn-success w-100">
                                <i class="fas fa-check"></i> Cập nhật
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Chi tiết sản phẩm -->
        <div class="card shadow-sm">
            <div class="card-header bg-info text-white">
                <h5 class="mb-0"><i class="fas fa-box-open"></i> Danh sách sản phẩm</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-bordered table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Mã SP</th>
                                <th>Số lượng</th>
                                <th>Đơn giá</th>
                                <th>Thành tiền</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="ct, iterStat : ${chiTiet}">
                                <td th:text="${iterStat.count}"></td>
                                <td th:text="${ct.maSP}"></td>
                                <td th:text="${ct.soLuong}"></td>
                                <td th:text="${#numbers.formatDecimal(ct.donGia, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                                <td class="fw-bold" th:text="${#numbers.formatDecimal(ct.thanhTien, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                            </tr>
                        </tbody>
                        <tfoot class="table-light">
                            <tr>
                                <td colspan="4" class="text-end fw-bold">Tổng cộng:</td>
                                <td class="text-danger fw-bold fs-5" th:text="${#numbers.formatDecimal(donHang.thanhToan, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
