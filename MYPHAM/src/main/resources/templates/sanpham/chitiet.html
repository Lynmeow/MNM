<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${sp.tenSP} + ' - XYNH Cosmetic'">Chi tiết sản phẩm</title>
    <link rel="stylesheet" th:href="@{/css/sanpham.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .chitiet-container { max-width: 900px; margin: 40px auto; padding: 0 20px; display: flex; gap: 40px; background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 40px; }
        .chitiet-img { flex: 1; }
        .chitiet-img img { width: 100%; border-radius: 10px; object-fit: cover; }
        .chitiet-info { flex: 1; }
        .chitiet-info h1 { font-size: 1.6rem; color: #333; margin-bottom: 16px; }
        .chitiet-price { font-size: 1.8rem; color: #e75480; font-weight: 700; margin-bottom: 20px; }
        .chitiet-section { margin-bottom: 20px; }
        .chitiet-section h3 { font-size: 1rem; font-weight: 600; color: #666; margin-bottom: 8px; }
        .chitiet-section p { color: #444; line-height: 1.7; }
        .btn-add-cart { display: inline-block; background: linear-gradient(135deg, #ff85c0, #ffb3d9); color: #fff; border: none; padding: 14px 32px; border-radius: 30px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 10px; transition: all 0.3s; }
        .btn-add-cart:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255,133,192,0.4); }
        .btn-back { display: inline-block; margin-bottom: 20px; color: #e75480; text-decoration: none; font-size: 0.95rem; }
        .btn-back:hover { text-decoration: underline; }
        @media (max-width: 700px) { .chitiet-container { flex-direction: column; } }
    </style>
</head>
<body>
<nav class="navbar">
    <ul>
        <li><a href="/">Trang Chủ</a></li>
        <li><a href="/sanpham/danhsach">Sản phẩm</a></li>
        <li><a href="/giohang">Giỏ hàng</a></li>
        <li><a href="/lienhe">Liên hệ</a></li>
    </ul>
</nav>

<div style="max-width:900px; margin:20px auto; padding:0 20px;">
    <a href="/sanpham/danhsach" class="btn-back">← Quay lại danh sách</a>
</div>

<div class="chitiet-container">
    <div class="chitiet-img">
        <img th:src="@{'/anh/' + ${sp.hinhAnh}}" th:alt="${sp.tenSP}" onerror="this.src='/anh/macdinh.png'">
    </div>
    <div class="chitiet-info">
        <h1 th:text="${sp.tenSP}">Tên sản phẩm</h1>
        <div class="chitiet-price"
             th:text="${#numbers.formatDecimal(sp.gia, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</div>

        <div class="chitiet-section" th:if="${sp.mota != null and !sp.mota.isEmpty()}">
            <h3>Mô tả sản phẩm</h3>
            <p th:text="${sp.mota}"></p>
        </div>

        <div class="chitiet-section" th:if="${sp.hdsd != null and !sp.hdsd.isEmpty()}">
            <h3>Hướng dẫn sử dụng</h3>
            <p th:text="${sp.hdsd}"></p>
        </div>

        <form th:action="@{/giohang/them}" method="post">
            <input type="hidden" name="maSP" th:value="${sp.maSP}">
            <button type="submit" class="btn-add-cart">
                <i class="fa fa-shopping-cart"></i> Thêm vào giỏ hàng
            </button>
        </form>
    </div>
</div>
</body>
</html>
