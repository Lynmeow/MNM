<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách sản phẩm</title>
    <link rel="stylesheet" href="/css/sanpham.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <ul>
            <li><a href="/">Trang Chủ</a></li>
            <li class="dropdown">
                <a href="#">Danh mục</a>
                <div class="dropdown-content">
                    <div th:each="dm : ${danhMucs}">
                        <a th:href="@{/sanpham/danhmuc/{maDM}(maDM=${dm.maDM})}" th:text="${dm.tenDM}"></a>
                    </div>
                </div>
            </li>
            <li><a href="/sanpham/danhsach">Sản phẩm</a></li>
            <li><a href="/gioithieu">Giới thiệu</a></li>
            <li><a href="/lienhe">Liên hệ</a></li>
            <a href="/giohang" class="cart-icon">
                <i class="fa fa-shopping-cart"></i>
                <span th:text="${cartCount ?: 0}">0</span>
            </a>
        </ul>
    </nav>

    <!-- Tiêu đề -->
    <h1>Tất Cả Các Sản Phẩm</h1>

    <!-- Tìm kiếm -->
    <div class="search-container">
        <form action="/sanpham/danhsach" method="get">
            <input type="text" name="q" class="search-bar" placeholder="Bạn muốn tìm gì..???" th:value="${q}">
            <button type="submit" class="search-button">Tìm kiếm</button>
        </form>
    </div>

    <!-- Nếu không có sản phẩm -->
    <div th:if="${sphams.isEmpty()}">
        <p>Không có sản phẩm nào phù hợp.</p>
    </div>

    <!-- Danh sách sản phẩm -->
    <div class="product-list" th:if="${!sphams.isEmpty()}">
        <div class="product-item" th:each="sp : ${sphams}">
            <img th:src="@{'/anh/' + ${sp.hinhAnh}}" 
                alt="Ảnh sản phẩm" 
                class="product-img product-clickable"
                th:attr="data-id=${sp.maSP},
                        data-name=${sp.tenSP},
                        data-image=${sp.hinhAnh},
                        data-price=${sp.gia},
                        data-description=${sp.mota},
                        data-hdsd=${sp.hdsd}">
            <h3 th:text="${sp.tenSP}"></h3>
            <p th:text="${#numbers.formatDecimal(sp.gia, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></p>

            <!-- Form Thêm vào giỏ -->
            <form th:action="@{/giohang/them}" method="post">
                <input type="hidden" name="maSP" th:value="${sp.maSP}">
                <button type="submit" class="add-to-cart" th:attr="data-product-id=${sp.maSP}">Thêm vào giỏ hàng</button>
            </form>
        </div>
    </div>

    <!-- Modal Chi tiết sản phẩm -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="modal-body">
                <div class="modal-image">
                    <img id="modalImage" src="" alt="Chi tiết sản phẩm">
                </div>
                <div class="modal-info">
                    <h2 id="modalTitle"></h2>
                    <p class="modal-price" id="modalPrice"></p>
                    <div class="modal-description">
                        <h3>Mô tả sản phẩm:</h3>
                        <p id="modalDescription"></p>
                    </div>
                    <div class="modal-description">
                        <h3>Hướng dẫn sử dụng:</h3>
                        <p id="modalHdsd"></p>
                    </div>
                    
                    <form id="modalForm" action="/giohang/them" method="post">
                        <input type="hidden" name="maSP" id="modalProductId">
                        <button type="submit" class="btn-add-to-cart">
                            <i class="fa fa-shopping-cart"></i> Thêm vào giỏ hàng
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast"></div>

    <!-- JavaScript -->
    <script>
        // Xử lý click vào hình ảnh sản phẩm để mở modal
        document.addEventListener('DOMContentLoaded', function() {
            // Thêm sự kiện click cho tất cả hình ảnh sản phẩm
            document.querySelectorAll('.product-clickable').forEach(img => {
                img.addEventListener('click', function() {
                    const maSP = this.getAttribute('data-id');
                    const tenSP = this.getAttribute('data-name');
                    const hinhAnh = this.getAttribute('data-image');
                    const gia = this.getAttribute('data-price');
                    const moTa = this.getAttribute('data-description');
                    const hdsd = this.getAttribute('data-hdsd');
                    openModal(maSP, tenSP, hinhAnh, gia, moTa, hdsd);
                });
            });

            // Đóng modal khi click vào nút X
            document.querySelector('.close').addEventListener('click', closeModal);

            // Đóng modal khi click bên ngoài
            window.addEventListener('click', function(event) {
                const modal = document.getElementById('productModal');
                if (event.target == modal) {
                    closeModal();
                }
            });

            // Xử lý nút "Thêm vào giỏ hàng"
            document.querySelectorAll('.add-to-cart').forEach(button => {
                button.addEventListener('click', function(e) {
                    e.preventDefault();

                    const btn = this;
                    const form = this.closest('form');

                    fetch(form.action, {
                        method: 'POST',
                        body: new FormData(form)
                    }).then(response => {
                        // Server redirect về /auth → chưa đăng nhập
                        if (response.url && response.url.includes('/auth')) {
                            showToast('Vui lòng đăng nhập để thêm sản phẩm vào giỏ hàng!');
                            return;
                        }

                        if (response.ok) {
                            // Cập nhật số đếm giỏ hàng
                            const cartCount = document.querySelector('.cart-icon span');
                            if (cartCount) {
                                cartCount.textContent = (parseInt(cartCount.textContent) || 0) + 1;
                            }

                            // Animation và toast chỉ chạy khi server xác nhận thành công
                            btn.classList.add('added');
                            const cartIcon = document.createElement('div');
                            cartIcon.classList.add('cart-icon-fly');
                            cartIcon.textContent = '✔';
                            btn.appendChild(cartIcon);
                            btn.classList.add('add-to-cart-animation');
                            setTimeout(() => {
                                cartIcon.remove();
                                btn.classList.remove('added', 'add-to-cart-animation');
                            }, 1500);

                            showToast('Sản phẩm đã được thêm vào giỏ!');
                        }
                    }).catch(error => {
                        console.error('Lỗi khi thêm vào giỏ:', error);
                        showToast('Có lỗi xảy ra, vui lòng thử lại!');
                    });
                });
            });
        });

        // Mở Modal
        function openModal(maSP, tenSP, hinhAnh, gia, moTa, hdsd) {
            document.getElementById('productModal').style.display = 'flex';
            document.getElementById('modalImage').src = '/anh/' + hinhAnh;
            document.getElementById('modalTitle').textContent = tenSP;
            document.getElementById('modalPrice').textContent = formatPrice(gia) + ' ₫';
            document.getElementById('modalDescription').textContent = moTa || 'Chưa có mô tả cho sản phẩm này.';
            document.getElementById('modalHdsd').textContent = hdsd || 'Chưa có hướng dẫn sử dụng.';  // ✅ ĐÃ THÊM DÒNG NÀY
            document.getElementById('modalProductId').value = maSP;
            document.body.style.overflow = 'hidden';
        }

        // Đóng Modal
        function closeModal() {
            document.getElementById('productModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // Format giá tiền
        function formatPrice(price) {
            return new Intl.NumberFormat('vi-VN').format(price);
        }

        // Hiển thị Toast Notification
        function showToast(message) {
            const toast = document.querySelector('.toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
