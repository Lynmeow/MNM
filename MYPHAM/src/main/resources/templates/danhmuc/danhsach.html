<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sản phẩm theo danh mục</title>
    <link rel="stylesheet" href="/css/danhmuc.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>

<!-- Navigation Bar -->
<nav class="navbar">
    <ul>
        <li><a href="/">Trang Chủ</a></li>
        <li class="dropdown">
            <a href="#">Danh mục</a>
            <div class="dropdown-content">
                <div th:each="dm : ${danhMucs}">
                    <a th:href="@{/sanpham/danhmuc/{maDM}(maDM=${dm.maDM})}" th:text="${dm.tenDM}"></a>
                </div>
            </div>
        </li>
        <li><a href="/sanpham/danhsach">Sản phẩm</a></li>
        <li><a href="/gioithieu">Giới thiệu</a></li>
        <li><a href="/lienhe">Liên hệ</a></li>
        
        <!-- Cart Icon -->
        <a href="/giohang" class="cart-icon">
            <i class="fa fa-shopping-cart"></i>
            <span th:text="${cartCount ?: 0}">0</span>
        </a>
    </ul>
</nav>

<!-- Main Section -->
<h1>Sản phẩm thuộc danh mục [[${tenDM}]]</h1>

<!-- Check if no products -->
<div th:if="${sanphams.size() == 0}">
    <p>Không có sản phẩm nào trong danh mục này.</p>
</div>

<!-- Product List -->
<div class="sanpham-container">
    <div class="sanpham-item" th:each="sp : ${sanphams}">
        <img th:src="@{'/anh/' + ${sp.hinhAnh}}" alt="Ảnh sản phẩm">
        <h3 th:text="${sp.tenSP}"></h3>
        <p class="price" th:text="'Giá: ' + ${sp.gia} + ' VND'"></p>
        <p class="description" th:text="${sp.mota}"></p>
        <form th:action="@{/giohang/them}" method="post" style="display:inline;">
            <input type="hidden" name="maSP" th:value="${sp.maSP}">
            <button type="submit" class="add-to-cart">Thêm vào giỏ</button>
        </form>
    </div>
</div>

</body>
</html>
